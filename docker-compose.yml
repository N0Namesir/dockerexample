services:
  app:
    build: .
    ports:
      - "${PORT:4023}:80"
    environment:
      DB_HOST: db
      DB_NAME: tareas_db
      DB_USER: alumno
      DB_PASS: alumno123
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: tareas_db
      MYSQL_USER: alumno
      MYSQL_PASSWORD: alumno123
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - dockerexample_db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.50"

volumes:
  dockerexample_db_data:
